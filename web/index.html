<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>words</title>
  <style>
    html, body { margin: 0; height: 100%; background: #17171c; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #status {
      position: fixed; left: 12px; bottom: 10px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #8a8a96; pointer-events: none; white-space: pre;
    }
    #panel {
      position: fixed; right: 12px; top: 10px; display: none;
      align-items: center; gap: 8px; padding: 8px 10px;
      background: rgba(23, 23, 28, 0.85); border: 1px solid #333;
      border-radius: 6px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #b8b8c4;
    }
    #panel input[type="number"] {
      width: 5.5em; background: #101014; color: #b8b8c4;
      border: 1px solid #444; border-radius: 3px; padding: 2px 4px;
      font: inherit;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">loading…</div>
  <!-- Dev panel, shown with ?ui in the URL: live layout-seed control. -->
  <div id="panel">
    <label for="seed-slider">seed</label>
    <input id="seed-slider" type="range" min="1" max="9999" step="1" value="1">
    <input id="seed-number" type="number" min="1" value="1">
  </div>
  <script src="words.js"></script>
  <script>
    const status = document.getElementById('status');
    // ?corpus= and ?font= resources are fetched lazily (they aren't in the
    // preloaded bundle) and written into MEMFS before main() runs; the C++
    // side just sees the files.
    const params = new URLSearchParams(location.search);
    const lazyFiles = [];
    if (params.get('corpus')) {
      lazyFiles.push({
        url: 'corpus/' + encodeURIComponent(params.get('corpus')) + '.tsv',
        path: '/corpus.tsv',
      });
    }
    if (params.get('font')) {
      lazyFiles.push({
        url: 'fonts/' + encodeURIComponent(params.get('font')) + '.ttf',
        path: '/font-override.ttf',
      });
    }
    // createWordsModule adopts this object as the Module, so the exported
    // runtime methods (FS, add/removeRunDependency) appear on it by the
    // time the preRun callback fires.
    const moduleConfig = {
      canvas: document.getElementById('canvas'),
      print: (text) => { console.log(text); status.textContent = text; },
      printErr: (text) => { console.error(text); },
      preRun: [() => {
        for (const f of lazyFiles) {
          moduleConfig.addRunDependency(f.url);
          fetch(f.url)
            .then((r) => {
              if (!r.ok) throw new Error(r.status + ' ' + f.url);
              return r.arrayBuffer();
            })
            .then((buf) => {
              moduleConfig.FS.writeFile(f.path, new Uint8Array(buf));
              moduleConfig.removeRunDependency(f.url);
            })
            .catch((err) => {
              status.textContent = 'failed to load ' + f.url + ': ' + err;
              console.error(err);
            });
        }
      }],
    };
    // ?ui shows the dev panel; the seed slider relayouts live through the
    // engine's wordsSetSeed export and mirrors the value into the URL, so
    // the address bar always names the cloud you're looking at.
    if (params.has('ui')) {
      const panel = document.getElementById('panel');
      const slider = document.getElementById('seed-slider');
      const number = document.getElementById('seed-number');
      panel.style.display = 'flex';
      const initial = parseInt(params.get('seed'), 10) || 1;
      slider.value = number.value = initial;
      let timer = null;
      const setSeed = (value) => {
        const seed = Math.max(1, parseInt(value, 10) || 1);
        slider.value = number.value = seed;
        const url = new URL(location);
        url.searchParams.set('seed', seed);
        history.replaceState(null, '', url);
        clearTimeout(timer);
        timer = setTimeout(() => {
          if (window.words) window.words._wordsSetSeed(seed);
        }, 150);
      };
      slider.addEventListener('input', () => setSeed(slider.value));
      number.addEventListener('input', () => setSeed(number.value));
    }

    createWordsModule(moduleConfig).then((module) => {
      // The engine's console handle: C++ exports (see main.cc) hang off
      // this, e.g. words._wordsLogScene() dumps engine state.
      window.words = module;
      console.log('words module ready — try words._wordsLogScene()');
    }).catch((err) => {
      status.textContent = 'failed to start: ' + err;
      console.error(err);
    });
  </script>
</body>
</html>
