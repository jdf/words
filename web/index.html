<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- maximum-scale pins WebKit's automatic rotate-to-landscape zoom
       (which otherwise scales the page instead of reflowing); iOS still
       allows user pinch-zoom for accessibility regardless. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>words</title>
  <link rel="icon" href="data:,"><!-- no favicon; silence the 404 -->
  <!-- Link-preview snippet (Open Graph + Twitter Card): what Slack,
       iMessage, Mastodon, etc. render when someone shares the URL. The
       image URL must be absolute — scrapers don't resolve relative
       paths reliably. Card regenerated via tools/e2e-shot.mjs with
       SHOT_VIEWPORT=1200x630 SHOT_HIDE="#status" (the demo config). -->
  <meta name="description"
        content="Paste any text and watch it become a beautiful word cloud — a rebuild of the original Wordle (2008) by its creator, running entirely in your browser. Export as PNG, SVG, or PDF.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mrfeinberg.com/words/">
  <meta property="og:site_name" content="MrFeinberg.com">
  <meta property="og:title" content="words — beautiful word clouds">
  <meta property="og:description"
        content="Paste any text and watch it become a beautiful word cloud — a rebuild of the original Wordle (2008) by its creator, running entirely in your browser. Export as PNG, SVG, or PDF.">
  <meta property="og:image" content="https://mrfeinberg.com/words/social-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt"
        content="A word cloud of Moby-Dick: whale, one, now, Ahab — bright words packed on black.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#17171c">
  <style>
    html, body { margin: 0; height: 100%; background: #17171c; }
    /* The hidden attribute always wins, even over display:flex rules. */
    [hidden] { display: none !important; }
    /* 100dvh tracks iOS Safari's collapsing toolbar; older browsers
       ignore it and keep the 100% above. */
    body { display: flex; flex-direction: row; height: 100dvh; }
    /* The canvas owns whatever the sidebar doesn't take. */
    #canvas {
      display: block; flex: 1; min-width: 0; height: 100%;
      touch-action: none;  /* the camera owns drags on the canvas */
    }
    #status {
      position: fixed; left: 12px; bottom: 10px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #8a8a96; pointer-events: none; white-space: pre;
    }
    body.with-ui #status { left: 268px; }
    #progress {
      position: fixed; left: 0; top: 0; height: 3px; width: 0;
      background: #4aa3ff; opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    /* Sidebar: in-flow down the left (never overlays the canvas), shown
       by default; ?no-ui hides it. Short windows scroll it: the gutter
       is reserved up front (scrollbar-gutter) so a classic scrollbar
       appearing never squeezes the buttons, and the width includes that
       gutter's allowance. */
    #panel {
      display: none; flex-direction: column; align-items: stretch;
      gap: 10px; width: 232px; flex: none; padding: 12px;
      background: #101014; border-right: 1px solid #333;
      font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #b8b8c4; overflow-y: auto;
      scrollbar-gutter: stable;
      scrollbar-width: thin; scrollbar-color: #37373f transparent;
    }
    #panel button {
      background: #1c1c22; color: #b8b8c4; border: 1px solid #444;
      border-radius: 6px; padding: 9px 12px; font: inherit;
      line-height: 1.2; cursor: pointer; white-space: nowrap;
    }
    #panel button:disabled { opacity: 0.35; cursor: default; }
    #panel button:hover:not(:disabled) { border-color: #777; background: #26262e; }
    #panel .spacer { flex: 1; }
    /* Dividers are phone-portrait separators only; desktop's grouping
       comes from the labeled boxes. */
    #panel .divider { display: none; }
    /* Labeled group boxes: the label sits on the top border line,
       punched out of it by the panel's own background. */
    #panel .group {
      display: flex; flex-direction: column; align-items: stretch;
      gap: 10px; position: relative; margin-top: 14px;
      border: 1px solid #333; border-radius: 8px; padding: 14px 8px 10px;
    }
    #panel .group-label {
      position: absolute; top: -8px; left: 10px; padding: 0 6px;
      background: #101014; color: #8a8a96; font-size: 11px;
      letter-spacing: 0.08em;
    }
    /* Green, to invite discovery. */
    #panel #use-words, #panel #use-book { color: #7ed99a; }
    #generate { text-align: left; }
    /* On desktop the pin/strip grouping is invisible to layout. */
    #panel .pin, #panel .strip { display: contents; }
    #dd-words, #dd-variance { display: none; }
    .var-val { color: #e0e0e8; }
    #panel .pair { display: flex; gap: 8px; }
    #panel .pair button { flex: 1; }
    #panel .slider-row {
      display: flex; flex-direction: column; gap: 2px; padding: 0 2px;
    }
    #panel .slider-row input[type="range"] {
      width: 100%; accent-color: #4aa3ff;
    }
    .max-val { color: #e0e0e8; }
    /* Menus fly out to the right of the sidebar, vertically centered on
       their button (clamped on screen by app.js). Transient overlays,
       like any menu. */
    .dd-btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      justify-content: space-between;
    }
    .dd-btn .tri { color: #8a8a96; font-size: 11px; }
    .dd-panel[hidden] { display: none; }
    .dd-panel {
      position: fixed; z-index: 20;
      display: flex; flex-direction: column; gap: 2px;
      min-width: 280px; max-height: min(80vh, 640px); overflow-y: auto;
      background: #131318; border: 1px solid #444; border-radius: 10px;
      padding: 8px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
    }
    .dd-opt {
      display: flex; align-items: center; gap: 12px; text-align: left;
      background: none; border: 1px solid transparent !important;
      border-radius: 8px; padding: 8px 10px !important;
    }
    .dd-opt:hover { background: #26262e; }
    .dd-opt.selected { border-color: #4aa3ff !important; }
    .dd-opt .thumb { width: 60px; height: 36px; flex: none; color: #b8b8c4; }
    .dd-opt .thumb.sw { height: 24px; }
    .dd-opt .sw-slot {
      width: 108px; flex: none; display: flex; justify-content: center;
    }
    .dd-opt .opt-label { flex: 1; }
    .dd-random { border-bottom: 1px solid #333 !important; border-radius: 8px 8px 0 0; margin-bottom: 4px; }
    dialog {
      background: #17171c; color: #b8b8c4; border: 1px solid #444;
      border-radius: 8px; padding: 16px; width: min(640px, 90vw);
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.6); }
    dialog h3 { margin: 0 0 10px; font-size: 15px; color: #e0e0e8; }
    dialog textarea {
      width: 100%; box-sizing: border-box; resize: vertical;
      background: #101014; color: #d8d8e0; border: 1px solid #444;
      border-radius: 4px; padding: 8px; font: inherit; font-size: 13px;
    }
    dialog .row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-top: 12px;
    }
    dialog button {
      background: #1c1c22; color: #b8b8c4; border: 1px solid #444;
      border-radius: 6px; padding: 8px 18px; font: inherit; cursor: pointer;
    }
    dialog button:hover { border-color: #777; background: #26262e; }
    dialog .go { border-color: #4aa3ff !important; color: #cfe6ff; }
    /* Pin the top edge (instead of centering) so the mode buttons stay
       put while PNG/SVG/PDF sections of different heights swap below. */
    #export-dialog { width: min(440px, 90vw); margin-top: 22vh; margin-bottom: auto; }
    /* Feedback: three big choices, build id in the footer. */
    #feedback-dialog { width: min(400px, 90vw); }
    .fb-hint { margin: 0 0 12px; color: #8a8a96; }
    .fb-opt {
      display: block; width: 100%; text-align: left; margin-top: 8px;
    }
    .fb-build {
      color: #8a8a96; font-size: 12px; user-select: text;
    }
    /* Credits: rendered markdown, scrolling inside the dialog. */
    #credits-dialog { width: min(560px, 90vw); }
    .credits-body { max-height: 65vh; overflow-y: auto; font-size: 13px; }
    .credits-body h1 { margin: 0 0 10px; font-size: 16px; color: #e0e0e8; }
    .credits-body h2 { margin: 16px 0 6px; font-size: 14px; color: #e0e0e8; }
    .credits-body h3 { margin: 12px 0 4px; font-size: 13px; color: #e0e0e8; }
    .credits-body p { margin: 8px 0; }
    .credits-body ul { margin: 8px 0; padding-left: 20px; }
    .credits-body li { margin: 4px 0; }
    .credits-body a { color: #4aa3ff; text-decoration: none; }
    .credits-body a:hover { text-decoration: underline; }
    /* Segmented format selector. */
    .seg { display: flex; gap: 0; }
    .seg button {
      flex: 1; border-radius: 0; border-right-width: 0;
    }
    .seg button:first-child { border-radius: 6px 0 0 6px; }
    .seg button:last-child { border-radius: 0 6px 6px 0; border-right-width: 1px; }
    .seg button.selected { background: #2a3b52; border-color: #4aa3ff; color: #cfe6ff; }
    .seg button.selected + button { border-left-color: #4aa3ff; }
    .ex-section { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    .ex-section label { display: flex; align-items: center; gap: 8px; }
    .ex-section input[type="number"], .ex-section select {
      background: #101014; color: #d8d8e0; border: 1px solid #444;
      border-radius: 4px; padding: 4px 6px; font: inherit;
    }
    .ex-section input[type="number"] { width: 6em; }
    .ex-dim { color: #8a8a96; }
    /* Book picker: search box, sortable column headers, scrolling list.
       Top edge pinned so the list growing/shrinking under the filter
       doesn't move the search box. */
    #book-dialog { width: min(480px, 90vw); margin-top: 12vh; margin-bottom: auto; }
    #book-search {
      width: 100%; box-sizing: border-box;
      background: #101014; color: #d8d8e0; border: 1px solid #444;
      border-radius: 4px; padding: 8px; font: inherit; font-size: 13px;
    }
    .book-head { display: flex; margin-top: 8px; }
    .book-head button {
      background: none; border: none !important; border-radius: 6px;
      padding: 4px 10px !important; color: #8a8a96; text-align: left;
    }
    .book-head button:first-child { flex: 1; }
    .book-head button.selected { color: #cfe6ff; }
    #book-list {
      display: flex; flex-direction: column; gap: 2px;
      height: min(55vh, 480px); overflow-y: auto;
    }
    .book-row {
      display: flex; gap: 12px; align-items: baseline; text-align: left;
      background: none; border: 1px solid transparent !important;
      border-radius: 8px; padding: 6px 10px !important; flex: none;
    }
    .book-row:hover { background: #26262e; }
    .book-row.selected { border-color: #4aa3ff !important; }
    .book-title { flex: 1; color: #d8d8e0; }
    .book-author { flex: none; color: #8a8a96; }
    /* Word context menu: a compact dd-panel at the cursor. It lives
       outside #panel, so the sidebar's button color/font rules don't
       reach it — restate them or the UA default paints black on black. */
    .word-menu { min-width: 0; z-index: 30; }
    .word-menu button {
      color: #b8b8c4; cursor: pointer;
      font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    /* Palette editor: a live-recolored sample cloud, the background +
       word-color swatch rows, and an inline HSV picker (shade square,
       hue strip, hex field) that edits whichever swatch is selected. */
    #palette-dialog {
      width: min(480px, 92vw);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
    }
    /* The palette previews live on the real cloud behind the dialog, so
       the backdrop must not dim it; the drag bar up top lets the dialog
       be pulled off whatever it covers. */
    #palette-dialog::backdrop { background: transparent; }
    .pal-drag {
      margin: -16px -16px 12px; padding: 10px 16px 8px;
      background: #101014; border-bottom: 1px solid #333;
      border-radius: 7px 7px 0 0; cursor: grab;
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .pal-drag:active { cursor: grabbing; }
    .pal-drag h3 { margin: 0; }
    .pal-section {
      display: flex; align-items: flex-start; gap: 10px; margin-top: 14px;
    }
    .pal-label { flex: none; width: 88px; padding-top: 7px; color: #8a8a96; }
    .pal-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
    .pal-slot { display: flex; flex-direction: column; align-items: center; }
    .pal-swatch {
      width: 36px; height: 30px; padding: 0; border-radius: 6px;
      border: 1px solid #555; cursor: pointer;
    }
    .pal-swatch.selected { outline: 2px solid #4aa3ff; outline-offset: 1px; }
    .pal-add {
      background: #1c1c22; color: #8a8a96; font-size: 18px; line-height: 1;
    }
    .pal-del {
      background: none; border: none; padding: 1px 8px; color: #8a8a96;
      font-size: 14px; line-height: 1.2; cursor: pointer;
    }
    .pal-del:hover { color: #e0e0e8; background: none; border: none; }
    .cp-main { display: flex; gap: 10px; margin-top: 14px; }
    .cp-sv {
      position: relative; flex: 1; height: 160px;
      border: 1px solid #333; border-radius: 6px;
      cursor: crosshair; touch-action: none;
    }
    .cp-dot {
      position: absolute; width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
      transform: translate(-50%, -50%); pointer-events: none;
    }
    .cp-hue {
      position: relative; flex: none; width: 20px;
      border: 1px solid #333; border-radius: 6px;
      cursor: ns-resize; touch-action: none;
      background: linear-gradient(to bottom, #f00, #ff0 16.7%, #0f0 33.3%,
                                  #0ff 50%, #00f 66.7%, #f0f 83.3%, #f00);
    }
    .cp-hue-dot {
      position: absolute; left: -3px; right: -3px; height: 7px;
      border-radius: 4px; border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
      transform: translateY(-50%); pointer-events: none;
    }
    .cp-hex-row {
      display: flex; align-items: center; gap: 8px; margin-top: 10px;
      color: #8a8a96;
    }
    #cp-hex {
      width: 7em; background: #101014; color: #d8d8e0;
      border: 1px solid #444; border-radius: 4px; padding: 4px 6px;
      font: inherit;
    }
    .pal-group { display: flex; align-items: center; gap: 8px; min-width: 0; }
    #palette-dialog .row { flex-wrap: wrap; }
    #pal-name {
      width: 9em; min-width: 0; background: #101014; color: #d8d8e0;
      border: 1px solid #444; border-radius: 4px; padding: 6px 8px;
      font: inherit;
    }
    /* The native select arrow crowds the truncated label; draw our own
       chevron with reserved padding instead. */
    #pal-load {
      appearance: none; -webkit-appearance: none;
      max-width: 12em; min-width: 0; text-overflow: ellipsis;
      background-color: #101014; color: #d8d8e0;
      background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpath d='M1 1l4 4 4-4' fill='none' stroke='%238a8a96' stroke-width='1.5'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 9px center;
      border: 1px solid #444; border-radius: 4px;
      padding: 6px 26px 6px 10px; font: inherit;
    }
    dialog button:disabled { opacity: 0.35; cursor: default; }
    /* Saved palettes live in their own refreshed-on-open box inside the
       palette menu, above the editor entry. */
    .dd-saved { display: flex; flex-direction: column; gap: 2px; }
    .dd-edit { border-top: 1px solid #333 !important; border-radius: 0 0 8px 8px; margin-top: 4px; }
    /* Phone in portrait: controls become a top bar — 🔄/↩/↪ icon-only
       and pinned left, the rest a horizontally scrolling strip; menus
       pop down below the bar (see positionMenuPanel in app.js). Last in
       the sheet so it outranks the desktop rules it overrides. */
    @media (max-width: 600px) and (orientation: portrait) {
      body { flex-direction: column; }
      body.with-ui #status { left: 12px; }
      #canvas { width: 100%; min-width: 0; height: auto; min-height: 0; }
      #panel {
        flex-direction: row; align-items: center; gap: 8px;
        width: auto; padding: 8px;
        border-right: none; border-bottom: 1px solid #333;
        overflow: visible;
      }
      #panel .pin { display: flex; gap: 6px; flex: none; align-items: center; }
      #panel .pair { display: contents; }
      /* The desktop group boxes flatten into the strip. */
      #panel .group { display: contents; }
      #panel .group-label { display: none; }
      .btn-label { display: none; }
      #panel .strip {
        display: flex; align-items: center; gap: 8px;
        flex: 1; min-width: 0; overflow-x: auto;
        scrollbar-width: none;
      }
      #panel .strip::-webkit-scrollbar { display: none; }
      /* Group children are strip items too (display: contents above). */
      #panel .strip > *, #panel .group > * { flex: none; }
      #panel button { white-space: nowrap; }
      #panel #words-inline, #panel #variance-inline { display: none; }
      #dd-words, #dd-variance { display: block; }
      #dd-words .dd-panel .slider-row,
      #dd-variance .dd-panel .slider-row { width: 240px; padding: 8px; }
      .dd-btn { width: auto; }
      #panel .divider {
        display: block; border: none; border-left: 1px solid #2c2c34;
        height: 24px; margin: 0; align-self: center;
      }
      #panel .spacer { display: none; }
    }
  </style>
</head>
<body>
  <!-- Dev toolbar, shown with ?ui in the URL: re-layout with undo/redo.
       In-flow above the canvas, so it never covers the cloud. -->
  <!-- .pin / .strip are display:contents on desktop (layout unchanged);
       in phone-portrait they become the fixed left cluster and the
       horizontally scrolling remainder of a top bar. -->
  <div id="panel">
    <div class="pin">
      <button id="generate" title="Generate a new cloud">🔄<span class="btn-label"> Generate</span></button>
      <div class="pair">
        <button id="undo" title="Undo (⌘Z)" disabled>↩<span class="btn-label"> Undo</span></button>
        <button id="redo" title="Redo (⇧⌘Z)" disabled>↪<span class="btn-label"> Redo</span></button>
      </div>
    </div>
    <!-- Desktop: labeled group boxes down the sidebar (text / layout /
         color / share). Phone-portrait flattens the groups back into
         the scrolling strip (display: contents) with the dividers as
         vertical separators. -->
    <div class="strip">
    <div class="group">
      <span class="group-label">text</span>
      <button id="use-words" title="Cloud your own text">Use My Words</button>
      <button id="use-book" title="Cloud a book from the library">Use a Book</button>
      <label class="slider-row" id="words-inline"
             title="Maximum words placed in the cloud">
        <span>Words <span class="max-val">800</span></span>
        <input type="range" class="max-input" min="50" max="2000" step="50"
               value="800">
      </label>
      <!-- Phone-portrait replacement for the inline slider: a button
           showing the count, slider in a pop-down. -->
      <div class="dd" id="dd-words" title="Maximum words placed in the cloud">
        <button class="dd-btn"><span class="dd-cur" id="words-btn-label">800 words</span><span class="tri">▸</span></button>
        <div class="dd-panel" hidden>
          <label class="slider-row">
            <span>Words <span class="max-val">800</span></span>
            <input type="range" class="max-input" min="50" max="2000" step="50"
                   value="800">
          </label>
        </div>
      </div>
      <div class="dd" id="dd-case" title="How case variants of a word combine">
        <button class="dd-btn"><span class="dd-cur"></span><span class="tri">▸</span></button>
        <div class="dd-panel" hidden></div>
      </div>
    </div>
    <hr class="divider">
    <div class="group">
      <span class="group-label">layout</span>
      <div class="dd" id="dd-font">
        <button class="dd-btn"><span class="dd-cur"></span><span class="tri">▸</span></button>
        <div class="dd-panel" hidden></div>
      </div>
      <div class="dd" id="dd-layout">
        <button class="dd-btn"><span class="dd-cur"></span><span class="tri">▸</span></button>
        <div class="dd-panel" hidden></div>
      </div>
      <div class="dd" id="dd-orientation">
        <button class="dd-btn"><span class="dd-cur"></span><span class="tri">▸</span></button>
        <div class="dd-panel" hidden></div>
      </div>
    </div>
    <hr class="divider">
    <div class="group">
      <span class="group-label">color</span>
      <div class="dd" id="dd-palette">
        <button class="dd-btn"><span class="dd-cur"></span><span class="tri">▸</span></button>
        <div class="dd-panel" hidden></div>
      </div>
      <label class="slider-row" id="variance-inline"
             title="How far word colors may wander from the palette">
        <span>Variance <span class="var-val">A Little</span></span>
        <input type="range" class="var-input" min="0" max="4" step="1"
               value="1">
      </label>
      <!-- Phone-portrait replacement: a button naming the level, slider
           in a pop-down. -->
      <div class="dd" id="dd-variance"
           title="How far word colors may wander from the palette">
        <button class="dd-btn"><span class="dd-cur" id="variance-btn-label">A Little Variance</span><span class="tri">▸</span></button>
        <div class="dd-panel" hidden>
          <label class="slider-row">
            <span>Variance <span class="var-val">A Little</span></span>
            <input type="range" class="var-input" min="0" max="4" step="1"
                   value="1">
          </label>
        </div>
      </div>
      <button id="recolor" title="Same palette, a fresh distribution of its colors">🎨<span class="btn-label"> Recolor</span></button>
    </div>
    <hr class="divider">
    <div class="group">
      <span class="group-label">share</span>
      <button id="export-btn" title="Save as PNG, SVG, or PDF">Export…</button>
      <!-- Book clouds are a pure function of the spec, so a URL
           reproduces them exactly; user-text clouds aren't sharable,
           so it hides. -->
      <button id="copy-link" title="Copy a link to this exact cloud"><span id="copy-link-icon">🔗</span><span class="btn-label"> Copy Link</span></button>
    </div>
    <span class="spacer"></span>
    <button id="credits-btn" title="Acknowledgements and licenses">Credits</button>
    <button id="feedback-btn" title="Report a bug, request a feature, or just say hi">Feedback</button>
    </div>
  </div>
  <!-- "Use My Words": paste or pick a local file (read entirely in the
       browser via FileReader — no upload anywhere). -->
  <dialog id="words-dialog">
    <h3>Use My Words</h3>
    <textarea id="user-text" rows="12"
              placeholder="Paste your text here…"></textarea>
    <div class="row">
      <input type="file" id="user-file" accept=".txt,.md,text/plain,text/*">
      <span>
        <button id="use-cancel">Cancel</button>
        <button id="use-go" class="go">Make Cloud</button>
      </span>
    </div>
  </dialog>
  <!-- Right-click-a-word menu (populated by app.js); a dd-panel so the
       shared dismiss paths (click-away, Escape, closeMenus) apply. -->
  <div class="dd-panel word-menu" id="word-menu" hidden></div>
  <!-- "Use a Book": the bundled public-domain library (word-count TSVs
       in dist/corpus/, manifest in corpus/index.tsv; see
       tests/corpus/README.md). -->
  <dialog id="book-dialog">
    <h3>Use a Book</h3>
    <input type="search" id="book-search" autocomplete="off"
           placeholder="Search titles and authors…">
    <div class="book-head">
      <button data-key="title" data-label="Title">Title</button>
      <button data-key="author" data-label="Author">Author</button>
    </div>
    <div id="book-list"></div>
    <div class="row">
      <span></span>
      <button id="book-cancel">Cancel</button>
    </div>
  </dialog>
  <!-- Export: everything derives from the engine's vector output — SVG
       verbatim, PNG rasterized in-page, PDF with the same outlines as
       native path operators. -->
  <dialog id="export-dialog">
    <h3>Export</h3>
    <div class="seg" id="export-mode">
      <button data-mode="png" class="selected">PNG</button>
      <button data-mode="svg">SVG</button>
      <button data-mode="pdf">PDF</button>
    </div>
    <div class="ex-section" id="ex-png">
      <label><input type="checkbox" id="png-transparent">
        Transparent background</label>
      <label>Size
        <select id="png-size">
          <option value="1280">1280 px wide</option>
          <option value="1920" selected>1920 px wide</option>
          <option value="2560">2560 px wide</option>
          <option value="3840">3840 px wide</option>
          <option value="custom">Custom…</option>
        </select>
        <span class="ex-dim" id="png-dim"></span>
      </label>
      <label id="png-custom" hidden>
        <input type="number" id="png-w" min="16" max="8192"> ×
        <input type="number" id="png-h" min="16" max="8192"> px
      </label>
    </div>
    <div class="ex-section" id="ex-svg" hidden>
      <label><input type="checkbox" id="svg-transparent">
        Transparent background</label>
    </div>
    <div class="ex-section" id="ex-pdf" hidden>
      <label>Page width
        <input type="number" id="pdf-inches" value="11" min="2" max="40"
               step="0.5"> in
        <span class="ex-dim" id="pdf-dim"></span>
      </label>
    </div>
    <div class="row">
      <span></span>
      <span>
        <button id="export-cancel">Cancel</button>
        <button id="export-go" class="go">Export</button>
      </span>
    </div>
  </dialog>
  <!-- Custom palette editor: swatches populated by app.js. Edits
       preview live on the real cloud behind the dialog (the backdrop is
       transparent; the drag bar moves the dialog out of the way);
       Cancel restores the committed palette. Saved palettes persist in
       localStorage and join the Palette menu. -->
  <dialog id="palette-dialog">
    <div class="pal-drag" id="pal-drag"><h3>Custom Palette</h3></div>
    <div class="pal-section">
      <span class="pal-label">Background</span>
      <div class="pal-swatches" id="pal-bg-row"></div>
    </div>
    <div class="pal-section">
      <span class="pal-label">Word colors</span>
      <div class="pal-swatches" id="pal-colors"></div>
    </div>
    <div id="cp" hidden>
      <div class="cp-main">
        <div class="cp-sv" id="cp-sv"><div class="cp-dot" id="cp-sv-dot"></div></div>
        <div class="cp-hue" id="cp-hue"><div class="cp-hue-dot" id="cp-hue-dot"></div></div>
      </div>
      <div class="cp-hex-row">
        <label for="cp-hex">Hex</label>
        <input id="cp-hex" autocomplete="off" spellcheck="false" maxlength="7">
      </div>
    </div>
    <div class="row">
      <span class="pal-group">
        <input id="pal-name" placeholder="Palette name" autocomplete="off">
        <button id="pal-save-btn" title="Save this palette in your browser">Save</button>
      </span>
      <span class="pal-group">
        <select id="pal-load" title="Load a saved palette"></select>
        <button id="pal-delete" title="Delete the selected saved palette">🗑</button>
      </span>
    </div>
    <div class="row">
      <span></span>
      <span>
        <button id="pal-cancel">Cancel</button>
        <button id="pal-use" class="go">Use Palette</button>
      </span>
    </div>
  </dialog>
  <!-- Credits: content/credits.md, rendered to credits.html at build time
       and fetched on first open. -->
  <!-- Feedback: each choice opens a prefilled GitHub issue form in a
       new tab (environment details included so bug reports arrive
       reproducible). -->
  <dialog id="feedback-dialog">
    <h3>Feedback</h3>
    <p class="fb-hint">Each option opens a GitHub issue in a new tab,
      prefilled with your platform, browser, and build details.</p>
    <button class="fb-opt" data-template="bug-report.yml">🐞 Report a Bug</button>
    <button class="fb-opt" data-template="feature-request.yml">✨ Request a Feature</button>
    <button class="fb-opt" data-template="feedback.yml">💬 General Feedback</button>
    <div class="row">
      <span class="fb-build" id="fb-build"></span>
      <button id="feedback-cancel">Cancel</button>
    </div>
  </dialog>
  <dialog id="credits-dialog">
    <div id="credits-body" class="credits-body">loading…</div>
    <div class="row">
      <span></span>
      <button id="credits-close" class="go">Close</button>
    </div>
  </dialog>
  <canvas id="canvas"></canvas>
  <div id="status">loading…</div>
  <div id="progress"></div>
  <script src="build-info.js"></script>
  <script src="app.js"></script>
</body>
</html>
