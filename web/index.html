<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>words</title>
  <style>
    html, body { margin: 0; height: 100%; background: #17171c; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #status {
      position: fixed; left: 12px; bottom: 10px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #8a8a96; pointer-events: none; white-space: pre;
    }
    #progress {
      position: fixed; left: 0; top: 0; height: 3px; width: 0;
      background: #4aa3ff; opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    #panel {
      position: fixed; right: 12px; top: 10px; display: none;
      align-items: center; gap: 8px; padding: 8px 10px;
      background: rgba(23, 23, 28, 0.85); border: 1px solid #333;
      border-radius: 6px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #b8b8c4;
    }
    #panel button {
      background: #101014; color: #b8b8c4; border: 1px solid #444;
      border-radius: 3px; padding: 2px 8px; font: inherit;
      font-size: 14px; cursor: pointer;
    }
    #panel button:disabled { opacity: 0.35; cursor: default; }
    #panel button:hover:not(:disabled) { border-color: #666; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">loading…</div>
  <div id="progress"></div>
  <!-- Dev panel, shown with ?ui in the URL: re-layout with undo/redo. -->
  <div id="panel">
    <button id="relayout" title="Re-layout">🔄</button>
    <button id="undo" title="Undo (⌘Z)" disabled>↩</button>
    <button id="redo" title="Redo (⇧⌘Z)" disabled>↪</button>
  </div>
  <script>
    // The page is pure UI: the engine (wasm + WebGL) lives in a worker
    // with an OffscreenCanvas, so layout never blocks this thread. The
    // engine posts progress/idle; we relay prints, gate inputs, and keep
    // the URL naming what's on screen.
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    const canvas = document.getElementById('canvas');
    const params = new URLSearchParams(location.search);

    const lazyFiles = [];
    if (params.get('corpus')) {
      lazyFiles.push({
        url: 'corpus/' + encodeURIComponent(params.get('corpus')) + '.tsv',
        path: '/corpus.tsv',
      });
    }
    if (params.get('font')) {
      lazyFiles.push({
        url: 'fonts/' + encodeURIComponent(params.get('font')) + '.ttf',
        path: '/font-override.ttf',
      });
    }

    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(canvas.clientWidth * dpr);
    canvas.height = Math.round(canvas.clientHeight * dpr);
    const offscreen = canvas.transferControlToOffscreen();

    const worker = new Worker('worker.js');
    worker.postMessage(
        { type: 'init', canvas: offscreen, search: location.search, lazyFiles },
        [offscreen]);

    // One command in flight at a time; the newest queued value wins.
    let busy = true;  // the initial build is in progress
    let pendingSeed = null;
    const sendSeed = (seed) => {
      busy = true;
      window.__wordsIdle = false;
      worker.postMessage({ type: 'setSeed', seed });
    };

    worker.onmessage = (e) => {
      const m = e.data;
      if (m.type === 'print') {
        console.log(m.text);
        status.textContent = m.text;
      } else if (m.type === 'printErr') {
        console.error(m.text);
      } else if (m.type === 'progress') {
        // Shaping is roughly the first third of the work; layout the rest.
        const frac = m.phase === 'shaping' ? 0.3 * (m.done / m.total)
                                           : 0.3 + 0.7 * (m.done / m.total);
        progress.style.opacity = 1;
        progress.style.width = (100 * frac).toFixed(1) + '%';
      } else if (m.type === 'idle') {
        busy = false;
        // The e2e harness (tools/e2e-shot.mjs) waits on this before taking
        // its screenshot. The idle message can outrun the worker's canvas
        // commit (separate threads), so let two compositor frames pass
        // before declaring the pixels ready.
        requestAnimationFrame(() => requestAnimationFrame(() => {
          window.__wordsIdle = true;
        }));
        progress.style.opacity = 0;
        progress.style.width = '0';
        if (pendingSeed !== null) {
          const seed = pendingSeed;
          pendingSeed = null;
          sendSeed(seed);
        }
      }
    };

    window.addEventListener('resize', () => {
      worker.postMessage({
        type: 'resize',
        width: Math.round(canvas.clientWidth * dpr),
        height: Math.round(canvas.clientHeight * dpr),
      });
    });

    // The engine's console handle, now a shim over the worker:
    // words._wordsLogScene() still dumps engine state to the console.
    window.words = {
      _wordsSetSeed: (seed) => { busy ? pendingSeed = seed : sendSeed(seed); },
      _wordsLogScene: () => worker.postMessage({ type: 'logScene' }),
    };

    // The cloud spec and its undo machinery. Every mutation flows through
    // apply() as an action holding before/after spec snapshots — an object
    // that knows how to undo (and redo) itself — so any change to the
    // cloud is reversible. The engine is a deterministic function of the
    // spec: submitting is just sending the current values, and the URL
    // mirrors them so the address bar always names the cloud on screen.
    const spec = { seed: parseInt(params.get('seed'), 10) || 1447 };
    const undoStack = [];
    const redoStack = [];

    const submitSpec = () => {
      const url = new URL(location);
      url.searchParams.set('seed', spec.seed);
      history.replaceState(null, '', url);
      window.words._wordsSetSeed(spec.seed);
    };
    const apply = (action) => {
      undoStack.push(action);
      redoStack.length = 0;
      Object.assign(spec, action.after);
      submitSpec();
      refreshButtons();
    };
    const undo = () => {
      const action = undoStack.pop();
      if (!action) return;
      redoStack.push(action);
      Object.assign(spec, action.before);
      submitSpec();
      refreshButtons();
    };
    const redo = () => {
      const action = redoStack.pop();
      if (!action) return;
      undoStack.push(action);
      Object.assign(spec, action.after);
      submitSpec();
      refreshButtons();
    };

    // ?ui shows the dev panel: 🔄 quietly bumps the seed for a fresh
    // layout; undo/redo walk the action stacks.
    const relayoutBtn = document.getElementById('relayout');
    const undoBtn = document.getElementById('undo');
    const redoBtn = document.getElementById('redo');
    const refreshButtons = () => {
      undoBtn.disabled = undoStack.length === 0;
      redoBtn.disabled = redoStack.length === 0;
    };
    if (params.has('ui')) {
      document.getElementById('panel').style.display = 'flex';
      relayoutBtn.addEventListener('click', () => apply({
        label: 'Re-layout',
        before: { ...spec },
        after: { ...spec, seed: spec.seed + 1 },
      }));
      undoBtn.addEventListener('click', undo);
      redoBtn.addEventListener('click', redo);
      window.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
          e.preventDefault();
          e.shiftKey ? redo() : undo();
        }
      });
    }
  </script>
</body>
</html>
